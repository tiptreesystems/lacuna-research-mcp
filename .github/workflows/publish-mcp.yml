name: Publish to MCP Registry

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag whose server.json should be published
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish server metadata
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://registry.modelcontextprotocol.io/?q=io.github.tiptreesystems%2Flacuna-research-mcp
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: Install MCP publisher
        run: |
          curl -fL \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_linux_amd64.tar.gz \
            -o mcp-publisher.tar.gz
          echo "1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf  mcp-publisher.tar.gz" \
            | sha256sum --check
          tar -xzf mcp-publisher.tar.gz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server metadata
        run: ./mcp-publisher publish
